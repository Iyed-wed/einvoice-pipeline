spring:
  application:
    name: einvoice-pipeline
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/einvoice}
    username: ${DB_USER:einvoice}
    password: ${DB_PASSWORD:einvoice}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only checks the mapping against it
      ddl-auto: validate
    open-in-view: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      # Every metric carries the application name, so a single Prometheus/Grafana
      # can host several services without label collisions.
      application: einvoice-pipeline

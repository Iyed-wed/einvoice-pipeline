spring:
  application:
    name: einvoice-pipeline
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/einvoice}
    username: ${DB_USER:einvoice}
    password: ${DB_PASSWORD:einvoice}
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only checks the mapping against it
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

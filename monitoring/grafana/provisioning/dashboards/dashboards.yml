# Loads any dashboard JSON dropped into /var/lib/grafana/dashboards (mounted
# from ./monitoring/grafana/dashboards) at startup — no manual import needed.
apiVersion: 1

providers:
  - name: einvoice-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
